# Smithery MCP Server Configuration
# https://smithery.ai/docs/build/publish

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      ebenovaApiKey:
        type: string
        description: "Your Ebenova API key with Insights access. Get one at https://ebenova.dev/insights"
      insightsApiBase:
        type: string
        description: "Insights API base URL (optional, defaults to https://api.ebenova.dev)"
        default: "https://api.ebenova.dev"
    required:
      - ebenovaApiKey
  commandFunction:
    command: npx
    args:
      - "-y"
      - "@ebenova/insights-mcp"
    env:
      EBENOVA_API_KEY: "{{ebenovaApiKey}}"
      INSIGHTS_API_BASE: "{{insightsApiBase}}"
