# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "Ebenova Insights — Reddit Monitor"
slug: "ebenova-insights"

runtime: node

build:
  install: "npm install"
  command: "echo 'No build step required'"

start:
  type: stdio
  command: "node index.js"

bridge:
  mode: stdio

configSchema:
  type: object
  required:
    - EBENOVA_API_KEY
  properties:
    EBENOVA_API_KEY:
      type: string
      description: "Your Ebenova API key with Insights access. Get one at https://ebenova.dev/insights"
    INSIGHTS_API_BASE:
      type: string
      description: "API base URL (optional, defaults to https://api.ebenova.dev)"
      default: "https://api.ebenova.dev"
