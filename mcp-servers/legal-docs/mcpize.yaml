# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "Ebenova Legal Docs"
slug: "ebenova-legal-docs"

runtime: nodejs

# No build step needed - pure Node.js server
build:
  install: "npm install"
  # No build command - source files are ready to run

start:
  type: stdio
  command: "node src/index.js"

bridge:
  mode: stdio

# Environment variables required
env:
  EBENOVA_API_KEY:
    description: "Your Ebenova API key"
    required: true
  EBENOVA_API_BASE:
    description: "API base URL"
    default: "https://api.ebenova.dev"
    required: false
