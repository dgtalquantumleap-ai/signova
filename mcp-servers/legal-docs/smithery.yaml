# Smithery configuration for ebenova-legal-docs-mcp
# https://smithery.ai/docs/build/publish

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      EBENOVA_API_KEY:
        type: string
        description: "Your Ebenova API key. Get one free at https://ebenova.dev/dashboard. Leave blank for sandbox mode (5 docs/month)."
        default: "sk_test_sandbox"
      EBENOVA_API_BASE:
        type: string
        description: "API base URL (optional, defaults to https://api.ebenova.dev)"
        default: "https://api.ebenova.dev"
    required: []
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'ebenova-legal-docs-mcp'],
      env: {
        EBENOVA_API_KEY: config.EBENOVA_API_KEY || 'sk_test_sandbox',
        EBENOVA_API_BASE: config.EBENOVA_API_BASE || 'https://api.ebenova.dev'
      }
    })
